<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerNet | Social Feed</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícones via FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <nav class="navbar">
        <div class="logo">GAMER<span>NET</span></div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar jogos, clãs...">
        </div>
        <div class="nav-icons">
            <i class="fas fa-bell"></i>
            <i class="fas fa-envelope"></i>
            <div class="user-thumb"></div>
        </div>
    </nav>

    <main class="container">
        <!-- Sidebar Perfil -->
        <aside class="profile-card">
            <div class="cover-photo"></div>
            <div class="profile-info">
                <div class="avatar"></div>
                <h2>GhostPlayer_99</h2>
                <p>Level 45 | Tank Main</p>
            </div>
            <div class="stats">
                <div><strong>1.2k</strong><span>Seguidores</span></div>
                <div><strong>450</strong><span>Seguindo</span></div>
            </div>
            <button class="btn-primary">EDITAR PERFIL</button>
        </aside>

        <!-- Feed de Postagens -->
        <section class="feed">
            <div class="post-input">
                <input type="text" placeholder="No que você está jogando agora?">
                <button class="btn-neon"><i class="fas fa-paper-plane"></i></button>
            </div>

            <!-- Card de Postagem 1 -->
            <article class="post-card">
                <div class="post-header">
                    <img src="https://placeholder.com" alt="user">
                    <div>
                        <h4>CyberWarrior</h4>
                        <span>há 2 horas</span>
                    </div>
                </div>
                <div class="post-content">
                    <p>Finalmente platinei Elden Ring! Que jornada épica. ⚔️✨</p>
                    <div class="post-image" style="background-image: url('https://unsplash.com');"></div>
                </div>
                <div class="post-actions">
                    <button class="like-btn"><i class="fas fa-heart"></i> 124</button>
                    <button><i class="fas fa-comment"></i> 12</button>
                    <button><i class="fas fa-share"></i></button>
                </div>
            </article>

            <!-- Card de Postagem 2 -->
            <article class="post-card">
                <div class="post-header">
                    <img src="https://placeholder.com" alt="user">
                    <div>
                        <h4>NeonQueen</h4>
                        <span>há 5 horas</span>
                    </div>
                </div>
                <div class="post-content">
                    <p>Alguém para fechar squad no Valorant hoje à noite? Rank Platina+!</p>
                </div>
                <div class="post-actions">
                    <button class="like-btn"><i class="fas fa-heart"></i> 89</button>
                    <button><i class="fas fa-comment"></i> 45</button>
                    <button><i class="fas fa-share"></i></button>
                </div>
            </article>
        </section>
    </main>

</body>
</html>
